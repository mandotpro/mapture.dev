version: 1

tags:
  - critical-path
  - customer-facing
  - pci

teams:
  - id: team-commerce
    name: Commerce Team
    email: commerce@example.com
    tags: [customer-facing]

  - id: team-billing
    name: Billing Team
    email: billing@example.com

domains:
  - id: orders
    name: Orders
    ownerTeams: [team-commerce]
    tags: [critical-path]

  - id: billing
    name: Billing
    ownerTeams: [team-billing]

scan:
  include:
    - ./src
  exclude:
    - ./vendor
    - ./node_modules
    - ./dist
    - ./build

languages:
  php: true
  go: true
  typescript: true

comments:
  style: tags

validation:
  failOnUnknownDomain: true
  failOnUnknownTeam: true
  failOnUnknownNode: true
  requireMetadataOn:
    - trigger
    - listener
  warnOnDeprecatedEvents: true

ui:
  defaultLayout: elk-horizontal
  nodeColors:
    service: "#2563eb"
    api: "#0f766e"
    database: "#b45309"
    event: "#be185d"
