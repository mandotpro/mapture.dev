version: 1

# Lean strangler-fig fixture that keeps a legacy checkout path alive
# while modern order ownership moves into a dedicated service.

teams:
  - id: team-legacy
    name: Legacy Commerce
    email: legacy@example.com

  - id: team-platform
    name: Orders Platform
    email: platform@example.com

domains:
  - id: legacy
    name: Legacy
    ownerTeams: [team-legacy]
    description: Monolith-owned checkout and order state that is being strangled away.
    allowedOutboundDomains: [orders]
    allowedInboundDomains: [orders]

  - id: orders
    name: Orders
    ownerTeams: [team-platform]
    description: Modern order write path and canonical order events.
    allowedOutboundDomains: [legacy]
    allowedInboundDomains: [legacy]

scan:
  include:
    - ./src
  exclude:
    - ./vendor
    - ./node_modules
    - ./dist
    - ./build

languages:
  php: true
  go: true

comments:
  style: tags

validation:
  failOnUnknownDomain: true
  failOnUnknownTeam: true
  failOnUnknownNode: true
  warnOnOrphanedNodes: false
  warnOnDeprecatedEvents: true
  requireMetadataOn:
    - trigger
    - listener

ui:
  nodeColors:
    service: "#1d4ed8"
    api: "#0f766e"
    database: "#b45309"
    event: "#be185d"
