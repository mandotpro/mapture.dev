events:
  - id: legacy.order.created
    name: Legacy Order Created
    description: Deprecated order-created event still emitted by the monolith while the migration window is open.
    domain: legacy
    ownerTeam: team-legacy
    kind: domain
    visibility: internal
    status: deprecated
    version: 1
    allowedTargetDomains: [orders]
    replacedBy: orders.created

  - id: orders.created
    name: Orders Created
    description: Canonical modern order-created event emitted after the dedicated orders service durably records a new order.
    domain: orders
    ownerTeam: team-platform
    kind: domain
    visibility: internal
    status: active
    version: 1
