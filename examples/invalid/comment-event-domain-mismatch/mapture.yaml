version: 1

teams:
  - id: team-commerce
    name: Commerce Team

domains:
  - id: orders
    name: Orders
    ownerTeams: [team-commerce]

  - id: billing
    name: Billing
    ownerTeams: [team-commerce]

scan:
  include:
    - ./src
  exclude:
    - ./vendor
    - ./node_modules
    - ./dist
    - ./build

languages:
  php: true
  go: true
  typescript: true

comments:
  style: tags

validation:
  failOnUnknownDomain: true
  failOnUnknownTeam: true
  failOnUnknownNode: true
  warnOnOrphanedNodes: false
  warnOnDeprecatedEvents: true
