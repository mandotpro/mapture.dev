version: 1

# Multi-language monorepo fixture used to exercise Mapture across
# PHP, Go, and TypeScript with a realistic commerce workflow.

teams:
  - id: team-commerce
    name: Commerce Platform
    email: commerce@example.com

  - id: team-operations
    name: Operations Platform
    email: operations@example.com

  - id: team-engagement
    name: Customer Engagement
    email: engagement@example.com

domains:
  - id: orders
    name: Orders
    ownerTeams: [team-commerce]
    description: Customer checkout flow and order lifecycle.
    allowedOutboundDomains: [billing, inventory, notifications]

  - id: billing
    name: Billing
    ownerTeams: [team-commerce]
    description: Payment authorization, capture, and reconciliation.
    allowedOutboundDomains: [shipping, notifications]
    allowedInboundDomains: [orders]

  - id: inventory
    name: Inventory
    ownerTeams: [team-operations]
    description: Stock reservations and availability tracking.
    allowedOutboundDomains: [notifications]
    allowedInboundDomains: [orders]

  - id: shipping
    name: Shipping
    ownerTeams: [team-operations]
    description: Shipment creation and carrier coordination.
    allowedOutboundDomains: [notifications]
    allowedInboundDomains: [billing, orders]

  - id: notifications
    name: Notifications
    ownerTeams: [team-engagement]
    description: Transactional customer notifications and delivery telemetry.
    allowedInboundDomains: [orders, billing, inventory, shipping]

scan:
  include:
    - ./src
  exclude:
    - ./vendor
    - ./node_modules
    - ./dist
    - ./build

languages:
  php: true
  go: true
  typescript: true

comments:
  style: tags

validation:
  failOnUnknownDomain: true
  failOnUnknownTeam: true
  failOnUnknownNode: true
  warnOnOrphanedNodes: false
  warnOnDeprecatedEvents: true
  requireMetadataOn:
    - trigger
    - listener
    - publisher
    - subscriber
    - bridge-out
    - bridge-in

ui:
  defaultLayout: elk-horizontal
  nodeColors:
    service: "#1d4ed8"
    api: "#0f766e"
    database: "#b45309"
    event: "#be185d"
