events:
  - id: order.placed
    name: Order Placed
    description: A customer successfully placed an order.
    domain: orders
    ownerTeam: team-commerce
    kind: domain
    visibility: internal
    status: active
    version: 1
    allowedTargetDomains: [billing, inventory, notifications]

  - id: order.cancelled
    name: Order Cancelled
    description: An order was cancelled before shipment.
    domain: orders
    ownerTeam: team-commerce
    kind: domain
    visibility: internal
    status: active
    version: 1
    allowedTargetDomains: [inventory, notifications]

  - id: payment.captured
    name: Payment Captured
    description: Payment was successfully captured for an order.
    domain: billing
    ownerTeam: team-commerce
    kind: domain
    visibility: internal
    status: active
    version: 1
    allowedTargetDomains: [shipping, notifications]
    allowedProducers: [service:payment-service]

  - id: payment.failed
    name: Payment Failed
    description: Payment could not be captured.
    domain: billing
    ownerTeam: team-commerce
    kind: domain
    visibility: internal
    status: active
    version: 1
    allowedTargetDomains: [notifications]
    allowedProducers: [service:payment-service]

  - id: stripe.webhook.received
    name: Stripe Webhook Received
    description: Raw webhook received from Stripe before internal normalization.
    domain: billing
    ownerTeam: team-commerce
    kind: integration
    visibility: private
    status: active
    allowedConsumers: [service:payment-service]

  - id: inventory.reserved
    name: Inventory Reserved
    description: Inventory was reserved for a newly placed order.
    domain: inventory
    ownerTeam: team-operations
    kind: domain
    visibility: internal
    status: active
    version: 1
    allowedTargetDomains: [notifications]

  - id: inventory.released
    name: Inventory Released
    description: Reserved inventory was released after an order change.
    domain: inventory
    ownerTeam: team-operations
    kind: domain
    visibility: internal
    status: active
    version: 1
    allowedTargetDomains: [notifications]

  - id: shipment.created
    name: Shipment Created
    description: A shipment and carrier label were created.
    domain: shipping
    ownerTeam: team-operations
    kind: domain
    visibility: internal
    status: active
    version: 1
    allowedTargetDomains: [notifications]

  - id: notification.sent
    name: Notification Sent
    description: Internal delivery event emitted after a customer notification is sent.
    domain: notifications
    ownerTeam: team-engagement
    kind: internal
    visibility: internal
    status: active
    version: 1
