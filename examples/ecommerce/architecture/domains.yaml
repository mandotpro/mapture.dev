domains:
  - id: orders
    name: Orders
    ownerTeams: [team-commerce]
    description: Customer checkout flow and order lifecycle.
    allowedOutboundDomains: [billing, inventory, notifications]

  - id: billing
    name: Billing
    ownerTeams: [team-commerce]
    description: Payment authorization, capture, and reconciliation.
    allowedOutboundDomains: [shipping, notifications]
    allowedInboundDomains: [orders]

  - id: inventory
    name: Inventory
    ownerTeams: [team-operations]
    description: Stock reservations and availability tracking.
    allowedOutboundDomains: [notifications]
    allowedInboundDomains: [orders]

  - id: shipping
    name: Shipping
    ownerTeams: [team-operations]
    description: Shipment creation and carrier coordination.
    allowedOutboundDomains: [notifications]
    allowedInboundDomains: [billing, orders]

  - id: notifications
    name: Notifications
    ownerTeams: [team-engagement]
    description: Transactional customer notifications and delivery telemetry.
    allowedInboundDomains: [orders, billing, inventory, shipping]
