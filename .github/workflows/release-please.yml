name: Release Please

on:
  push:
    branches:
      - 0.x
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          target-branch: 0.x
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
