name: Canary

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Publish canary even if main has not changed since the last canary
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: canary-main
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.meta.outputs.should_publish }}
      version: ${{ steps.meta.outputs.version }}
      sha: ${{ steps.meta.outputs.sha }}
      built_at: ${{ steps.meta.outputs.built_at }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          FORCE_PUBLISH: ${{ inputs.force && 'true' || 'false' }}
        run: |
          short_sha="$(git rev-parse --short HEAD)"
          built_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          version="0.0.0-canary.$(date -u +%Y%m%d)+sha.${short_sha}"
          current_sha="$(git rev-parse HEAD)"
          should_publish="true"

          if [[ "${{ github.event_name }}" == "schedule" || "$FORCE_PUBLISH" != "true" ]]; then
            previous_sha="$(gh api "repos/${GH_REPO}/releases/tags/canary" --jq '.target_commitish' 2>/dev/null || true)"
            if [[ -n "$previous_sha" && "$previous_sha" == "$current_sha" ]]; then
              should_publish="false"
            fi
          fi

          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha=$current_sha" >> "$GITHUB_OUTPUT"
          echo "built_at=$built_at" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: ${{ needs.prepare.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build release archive
        run: |
          mkdir -p dist
          ./scripts/release/release-build.sh "${{ needs.prepare.outputs.version }}" "${{ matrix.goos }}" "${{ matrix.goarch }}" dist
      - uses: actions/upload-artifact@v7
        with:
          name: canary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish:
    needs:
      - prepare
      - build
    if: ${{ needs.prepare.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: canary-*
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
      - name: Publish rolling canary prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          CANARY_SHA: ${{ needs.prepare.outputs.sha }}
          CANARY_VERSION: ${{ needs.prepare.outputs.version }}
          CANARY_BUILT_AT: ${{ needs.prepare.outputs.built_at }}
        run: |
          cat > canary-notes.md <<EOF
          Rolling canary build from \`main\`.

          - Commit: \`$CANARY_SHA\`
          - Version: \`$CANARY_VERSION\`
          - Built at (UTC): \`$CANARY_BUILT_AT\`
          - Cadence: nightly, only when \`main\` changed since the previous canary
          EOF

          if gh release view canary >/dev/null 2>&1; then
            mapfile -t assets < <(gh release view canary --json assets --jq '.assets[].name')
            for asset in "${assets[@]}"; do
              gh release delete-asset canary "$asset" --yes
            done
            gh release edit canary \
              --prerelease \
              --target "$CANARY_SHA" \
              --title "canary" \
              --notes-file canary-notes.md
            gh release upload canary dist/*
          else
            gh release create canary dist/* \
              --prerelease \
              --target "$CANARY_SHA" \
              --title "canary" \
              --notes-file canary-notes.md
          fi

  sync-homebrew-tap:
    needs:
      - prepare
      - publish
    if: ${{ needs.prepare.outputs.should_publish == 'true' && vars.HOMEBREW_TAP_REPO != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - name: Sync canary formula to Homebrew tap
        env:
          GH_REPO: ${{ github.repository }}
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          CANARY_SHA: ${{ needs.prepare.outputs.sha }}
          CANARY_VERSION: ${{ needs.prepare.outputs.version }}
          CANARY_BUILT_AT: ${{ needs.prepare.outputs.built_at }}
        run: |
          if [[ -z "$HOMEBREW_TAP_TOKEN" ]]; then
            echo "HOMEBREW_TAP_TOKEN is not configured; skipping tap sync."
            exit 0
          fi

          built_stamp="$(printf '%s' "$CANARY_BUILT_AT" | tr -d ':-TZ')"
          formula_version="0.0.0-canary.${built_stamp}.${CANARY_SHA:0:7}"
          source_url="https://github.com/${GH_REPO}/archive/${CANARY_SHA}.tar.gz"
          curl -fsSL "$source_url" -o "$RUNNER_TEMP/mapture-canary-source.tar.gz"
          source_sha256="$(sha256sum "$RUNNER_TEMP/mapture-canary-source.tar.gz" | awk '{print $1}')"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" "$RUNNER_TEMP/homebrew-tap"

          ./scripts/release/sync-homebrew-tap.sh \
            --tap-dir "$RUNNER_TEMP/homebrew-tap" \
            --tap-repo "$HOMEBREW_TAP_REPO" \
            --formula-name mapture-canary \
            --class-name MaptureCanary \
            --formula-version "$formula_version" \
            --binary-version "$CANARY_VERSION" \
            --source-url "$source_url" \
            --source-sha256 "$source_sha256"

          cd "$RUNNER_TEMP/homebrew-tap"
          if git diff --quiet; then
            echo "Homebrew tap already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mapture-canary.rb README.md
          git commit -m "Update mapture-canary to ${CANARY_VERSION}"
          git push origin HEAD:main
