name: Canary

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: canary-main
  cancel-in-progress: true

jobs:
  prepare:
    if: ${{ (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha: ${{ steps.meta.outputs.sha }}
      built_at: ${{ steps.meta.outputs.built_at }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
      - id: meta
        run: |
          short_sha="$(git rev-parse --short HEAD)"
          built_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          version="0.0.0-canary.$(date -u +%Y%m%d)+sha.${short_sha}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "built_at=$built_at" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build release archive
        run: |
          mkdir -p dist
          ./scripts/release-build.sh "${{ needs.prepare.outputs.version }}" "${{ matrix.goos }}" "${{ matrix.goarch }}" dist
      - uses: actions/upload-artifact@v7
        with:
          name: canary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: canary-*
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
      - name: Publish rolling canary prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          CANARY_SHA: ${{ needs.prepare.outputs.sha }}
          CANARY_VERSION: ${{ needs.prepare.outputs.version }}
          CANARY_BUILT_AT: ${{ needs.prepare.outputs.built_at }}
        run: |
          cat > canary-notes.md <<EOF
          Rolling canary build from \`main\`.

          - Commit: \`$CANARY_SHA\`
          - Version: \`$CANARY_VERSION\`
          - Built at (UTC): \`$CANARY_BUILT_AT\`
          EOF

          if gh release view canary >/dev/null 2>&1; then
            mapfile -t assets < <(gh release view canary --json assets --jq '.assets[].name')
            for asset in "${assets[@]}"; do
              gh release delete-asset canary "$asset" --yes
            done
            gh release edit canary \
              --prerelease \
              --target "$CANARY_SHA" \
              --title "canary" \
              --notes-file canary-notes.md
            gh release upload canary dist/*
          else
            gh release create canary dist/* \
              --prerelease \
              --target "$CANARY_SHA" \
              --title "canary" \
              --notes-file canary-notes.md
          fi
