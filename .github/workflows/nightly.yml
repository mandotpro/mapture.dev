name: Nightly

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write

jobs:
  prepare:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - id: meta
        run: |
          short_sha="$(git rev-parse --short HEAD)"
          version="0.0.0-nightly.$(date -u +%Y%m%d)+sha.${short_sha}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build release archive
        run: |
          mkdir -p dist
          ./scripts/release-build.sh "${{ needs.prepare.outputs.version }}" "${{ matrix.goos }}" "${{ matrix.goarch }}" dist
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: nightly-*
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
      - name: Publish rolling nightly prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          NIGHTLY_SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          gh release delete nightly --yes --cleanup-tag || true
          gh release create nightly dist/* \
            --prerelease \
            --target "$NIGHTLY_SHA" \
            --title "nightly" \
            --notes "Rolling nightly build from main at commit $NIGHTLY_SHA."
