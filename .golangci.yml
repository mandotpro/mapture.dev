version: "2"

run:
  timeout: 5m
  relative-path-mode: gomod
  tests: true

linters:
  enable:
    - errcheck
    - gocyclo
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused

linters-settings:
  gocyclo:
    min-complexity: 15
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: receiver-naming
      - name: var-declaration

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
